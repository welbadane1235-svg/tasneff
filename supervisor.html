<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نسخة المشرف - تصنيف</title>
<link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body onload="initSupervisor()">
<div class="mobile-shell">
  <header class="hero compact"><div><h1 id="supTitle">لوحة المشرف</h1><p>سجل الدخول والخروج والحضور والتكتات من الجوال.</p></div><button onclick="logout()">خروج</button></header>
  <div id="globalMsg" class="msg hidden"></div>
  <section class="card"><h2>تسجيل دخول / خروج مشروع</h2><input type="hidden" id="logId"><label>المشروع</label><select id="logProject"></select><label>التاريخ</label><input type="date" id="logDate"><div class="split"><div><label>وقت الدخول</label><input type="time" id="logIn"></div><div><label>وقت الخروج</label><input type="time" id="logOut"></div></div><label>وقت الانتقال / الضائع بالدقائق</label><input type="number" id="logTravel" value="0"><label>ملاحظات</label><textarea id="logNotes"></textarea><div class="actions"><button onclick="supervisorCheckIn()">دخول الآن</button><button onclick="supervisorCheckOut()">خروج الآن</button><button class="light" onclick="saveTimeLog()">حفظ يدوي</button></div></section>
  <section class="card"><h2>تحضير العمال</h2><label>التاريخ</label><input type="date" id="attendanceDate"><label>المشروع</label><select id="attendanceProject"></select><div id="supervisorAttendanceList" class="quick-list"></div><button onclick="saveSupervisorAttendance()">حفظ التحضير</button></section>
  <section class="card"><h2>رفع تكت</h2><input type="hidden" id="ticketId"><label>المشروع</label><select id="ticketProject"></select><label>العنوان</label><input id="ticketTitle"><label>الأولوية</label><select id="ticketPriority"><option value="normal">عادي</option><option value="high">عاجل</option><option value="low">منخفض</option></select><label>الوصف</label><textarea id="ticketDescription"></textarea><button onclick="saveTicket()">إرسال التكت</button></section>
  <section class="card"><h2>سجلاتي اليوم</h2><div class="table-wrap"><table><thead><tr><th>المشروع</th><th>الدخول</th><th>الخروج</th><th>المدة</th></tr></thead><tbody id="logsBody"></tbody></table></div></section>
</div>
<script src="app.js"></script>
</body>
</html>
