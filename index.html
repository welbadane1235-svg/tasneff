<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام تصنيف للتشغيل</title>
<style>
:root{--brand:#0A4033;--brand2:#0f5a47;--bg:#f3f6f5;--card:#fff;--line:#dce6e2;--text:#10231d;--muted:#60706a;--red:#b83232;--green:#137a4b;--amber:#9a6b00}*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text)}button{font-family:inherit;border:0;background:var(--brand);color:#fff;border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer}button.light{background:#eef6f3;color:var(--brand);border:1px solid var(--line)}button.danger,.danger{background:var(--red)!important}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px;background:#fff;font-family:inherit;font-size:14px}textarea{min-height:82px;resize:vertical}label{display:block;margin:10px 0 6px;color:var(--brand);font-weight:700;font-size:13px}.hidden{display:none!important}.login-body{min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 15% 15%,#e8f3ef,transparent 35%),linear-gradient(180deg,#eef6f3,#f8fbfa)}.login-card{width:min(440px,92vw);background:#fff;border:1px solid var(--line);border-radius:24px;padding:28px;box-shadow:0 18px 44px rgba(10,64,51,.12);text-align:center}.login-card h1{margin:10px 0;color:#071b33}.login-card p{color:var(--muted)}.logo-mark,.brand span{width:64px;height:64px;border-radius:20px;background:var(--brand);display:grid;place-items:center;color:#fff;font-size:28px;font-weight:900;margin:auto}.login-card button{width:100%;margin-top:14px}.login-card small{display:block;margin-top:18px;color:var(--muted)}.app-shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh}.side{background:#101b2f;color:#fff;padding:18px;position:sticky;top:0;height:100vh;overflow:auto}.brand{display:flex;align-items:center;gap:12px;margin-bottom:22px}.brand span{width:46px;height:46px;border-radius:14px;margin:0}.brand small{display:block;color:#b7c2d6;margin-top:4px}.nav{display:block;width:100%;text-align:right;background:transparent;color:#fff;margin:6px 0;border:1px solid transparent}.nav:hover,.nav.active{background:#1d2b46;border-color:#354560}.content{padding:22px;overflow:auto}.hero{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border-radius:24px;padding:24px;display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px;box-shadow:0 12px 34px rgba(10,64,51,.12)}.hero h1{margin:0 0 8px}.hero p{margin:0;color:#e9f5f1;line-height:1.7}.compact{border-radius:0 0 22px 22px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 8px 24px rgba(10,64,51,.05);margin-bottom:16px}.card h2{margin:0 0 14px;color:var(--brand)}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.kpis.small{grid-template-columns:repeat(3,1fr)}.kpi{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px}.kpi small{color:var(--muted)}.kpi b{display:block;font-size:32px;color:var(--brand);margin-top:8px}.grid.two{display:grid;grid-template-columns:390px 1fr;gap:16px}.split{display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions,.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:end;margin:12px 0}.filters>*{min-width:160px;flex:1}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px;max-height:66vh;background:#fff}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:10px;border-bottom:1px solid #edf1ef;text-align:right;white-space:nowrap;vertical-align:top}th{position:sticky;top:0;background:#f8fbfa;color:#4c635c;z-index:1}.badge{display:inline-block;padding:5px 9px;border-radius:999px;background:#eef6f3;color:var(--brand);font-size:12px;font-weight:700}.badge.red{background:#fde8e8;color:#9d2222}.badge.green{background:#e8f4ee;color:#137a4b}.badge.amber{background:#fff5da;color:#8a6700}.row-actions{display:flex;gap:6px}.row-actions button{padding:7px 9px;border-radius:9px;font-size:12px}.msg{padding:11px 13px;border-radius:12px;margin:10px 0;background:#eef6f3;color:var(--brand);border:1px solid var(--line)}.msg.err{background:#fde8e8;color:#9d2222}.summary-grid,.alerts{display:grid;gap:10px}.summary-grid{grid-template-columns:repeat(3,1fr)}.summary-item,.alert-item{background:#fbfdfc;border:1px solid var(--line);border-radius:14px;padding:12px;line-height:1.7}.alert-item.warn{background:#fff8e8;border-color:#f0d48d}.alert-item.danger{background:#fde8e8;border-color:#efc3c3}.quick-list{display:grid;gap:8px;margin:12px 0}.quick-item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fbfdfc;border:1px solid var(--line);border-radius:12px;padding:10px}.quick-item select{max-width:140px}.mobile-shell{max-width:760px;margin:0 auto;padding-bottom:24px}.mobile-shell .card{margin:14px}.mobile-shell .hero{margin-bottom:14px}@media(max-width:1000px){.app-shell{grid-template-columns:1fr}.side{position:static;height:auto;display:grid;grid-template-columns:repeat(2,1fr);gap:6px}.brand{grid-column:1/-1}.content{padding:12px}.grid.two,.kpis,.summary-grid{grid-template-columns:1fr}.hero{border-radius:0 0 22px 22px;margin:-12px -12px 14px}.split{grid-template-columns:1fr}.side .nav{text-align:center}}

</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-body">
  <main class="login-card">
    <div class="logo-mark">ت</div>
    <h1>نظام تصنيف للتشغيل</h1>
    <p>تسجيل دخول الإدارة والمشرفين</p>
    <label>اسم المستخدم</label>
    <input id="loginUsername" autocomplete="username" placeholder="admin">
    <label>كلمة المرور</label>
    <input id="loginPassword" type="password" autocomplete="current-password" placeholder="123456">
    <button onclick="login()">دخول</button>
    <div id="loginMsg" class="msg hidden"></div>
    <small>الإدارة: admin / 123456</small>
  </main>
<script src="app.js?v=61"></script>
</body>
</html>
