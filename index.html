<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>تسجيل الدخول - تصنيف</title><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body class="login-body"><main class="login-card"><div class="logo">ت</div><h1>نظام تصنيف للتشغيل</h1><p class="sub">تسجيل دخول الإدارة والمشرفين</p><div class="field"><label>اسم المستخدم</label><input id="username" placeholder="مثال: admin" autocomplete="username"></div><div class="field"><label>كلمة المرور</label><input id="password" type="password" placeholder="مثال: 123456" autocomplete="current-password"></div><button class="btn full" onclick="login()">دخول</button><div id="loginMsg" class="hidden"></div><p class="sub" style="margin-top:18px;font-size:12px">قبل التشغيل: عدّل بيانات Supabase داخل ملف app.js</p></main><script src="app.js"></script><script>document.addEventListener('keydown',e=>{if(e.key==='Enter')login()});</script></body></html>
