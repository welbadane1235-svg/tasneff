<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام تصنيف للتشغيل</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-body">
  <main class="login-card">
    <div class="logo-mark">ت</div>
    <h1>نظام تصنيف للتشغيل</h1>
    <p>تسجيل دخول الإدارة والمشرفين</p>
    <label>اسم المستخدم</label>
    <input id="loginUsername" autocomplete="username" placeholder="admin">
    <label>كلمة المرور</label>
    <input id="loginPassword" type="password" autocomplete="current-password" placeholder="123456">
    <button onclick="login()">دخول</button>
    <div id="loginMsg" class="msg hidden"></div>
    <small>الإدارة: admin / 123456</small>
  </main>
<script src="app.js"></script>
</body>
</html>
